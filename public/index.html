<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>GPX Tile Map</title>
	<style>
		html,
		body {
			height: 100%;
			margin: 0;
			overflow: hidden;
		}

		#map-container {
			position: relative;
			width: 100%;
			height: 100%;
		}

		#osm-canvas,
		#gpx-canvas {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>

<body>
	<div id="map-container">
		<canvas id="osm-canvas"></canvas>
		<canvas id="gpx-canvas"></canvas>
	</div>
	<script src="/index.js"></script>
</body>

</html>
